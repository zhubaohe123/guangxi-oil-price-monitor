version: '3.8'

services:
  # 主应用服务 - 使用简化版本
  oil-monitor:
    build: .
    container_name: guangxi-oil-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-demo-key}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      - DATABASE_URL=sqlite:///data/oil_prices.db
      - LOG_LEVEL=INFO
    command: >
      uvicorn app.main_simple:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: oil-monitor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # PostgreSQL数据库（可选，默认使用SQLite）
  postgres:
    image: postgres:15-alpine
    container_name: oil-monitor-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=oilmonitor
      - POSTGRES_PASSWORD=${DB_PASSWORD:-oilmonitor123}
      - POSTGRES_DB=oil_prices
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oilmonitor"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  postgres-data: